apiVersion: batch/v1
kind: CronJob
metadata:
  name: xray-routing-panel-db-backup
  namespace: xray-routing-panel
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            xray-routing-panel/edge: "true"
          containers:
            - name: backup
              image: ghcr.io/your-org/xray-routing-panel:latest
              imagePullPolicy: IfNotPresent
              command:
                - python3
                - /app/scripts/backup_db.py
                - --db-path
                - /data/panel.db
                - --backup-dir
                - /backups
                - --keep-days
                - "7"
                - --prefix
                - xray-routing-panel
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              volumeMounts:
                - name: panel-data
                  mountPath: /data
                - name: panel-backups
                  mountPath: /backups
          volumes:
            - name: panel-data
              persistentVolumeClaim:
                claimName: panel-data-pvc
            - name: panel-backups
              persistentVolumeClaim:
                claimName: panel-backups-pvc
