apiVersion: v1
kind: Service
metadata:
  name: xray-routing-panel-headless
  namespace: xray-routing-panel
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: xray-routing-panel
  ports:
    - name: panel-http
      port: 18080
      targetPort: 18080
---
apiVersion: v1
kind: Service
metadata:
  name: xray-routing-panel-http
  namespace: xray-routing-panel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: xray-routing-panel
  ports:
    - name: panel-http
      port: 18080
      targetPort: 18080
