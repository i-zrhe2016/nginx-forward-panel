apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: panel-data-pvc
  namespace: xray-routing-panel
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
