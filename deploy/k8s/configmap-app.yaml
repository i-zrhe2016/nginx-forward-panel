apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-forward-panel-config
  namespace: nginx-forward-panel
data:
  PANEL_HOST: "0.0.0.0"
  PANEL_PORT: "18080"
  PANEL_PUBLIC_URL: "http://your-node-or-domain:18080"
  PANEL_USERNAME: ""
  PANEL_PASSWORD: ""
  DEFAULT_UPSTREAM_HOST: "127.0.0.1"
  DEFAULT_UPSTREAM_PORT: "443"
  SEED_LISTEN_PORT: "31098"
  XRAY_CLIENT_CONFIG_PATH: "/xray-runtime/client-test.json"
  PROBE_ENABLED: "1"
  PROBE_INTERVAL: "180"
  PROBE_TEST_LISTEN_PORT: "31098"
  STREAM_LISTEN_BACKLOG: "4096"
  STREAM_LISTEN_FASTOPEN: "256"
  STREAM_LISTEN_SO_KEEPALIVE: "on"
  STREAM_PROXY_SOCKET_KEEPALIVE: "1"
  AI_DOMAIN_INTERVAL_SECONDS: "3600"
  AI_DOMAIN_LOOKBACK_SECONDS: "3600"
  AI_DOMAIN_BATCH_SIZE: "50"
  CODEX_CLASSIFIER_ENABLED: "0"
  OPENAI_MODEL: "gpt-5.5"
  OPENAI_BASE_URL: "https://api.openai.com/v1/responses"
  PANEL_ROUTE_LISTEN_PORT: "31098"
  XRAY_WORKSPACE_DIR: "/workspace"
  XRAY_ENV_FILE: "/workspace/.env"
  XRAY_RENDER_SCRIPT: "/workspace/scripts/render_config.py"
  XRAY_ACCESS_LOG_PATH: "/workspace/logs/access.log"
  AI_DOMAIN_REPORT_OUTPUT_DIR: "/workspace/reports/hourly-domains"
  AI_DOMAIN_CLASSIFICATION_STATE_PATH: "/workspace/runtime/ai-domain-decisions.json"
  AI_DOMAIN_DYNAMIC_ROUTING_PATH: "/workspace/runtime/dynamic-routing.json"
  XRAY_CONFIG_OUT: "/workspace/runtime/config.json"
  XRAY_CLIENT_OUT: "/workspace/runtime/client-test.json"
  XRAY_SHARE_OUT: "/workspace/runtime/client-share.txt"
  AI_PROXY_OUTBOUND_TEMPLATE_PATH: "/workspace/ai-proxy-outbound.json"
  PANEL_DB_PATH: "/panel-data/panel.db"
  XRAY_RESTART_COMMAND: "kill $(pidof xray)"
  XRAY_TCP_FAST_OPEN: "1"
  XRAY_TCP_KEEPALIVE_IDLE: "180"
  XRAY_TCP_KEEPALIVE_INTERVAL: "30"
